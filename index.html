<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odin Sign-up Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="background">
    <div class="title">
      <img src="images/odin-lined.png" alt="odin logo">
      <span class="title-text">ODIN</span>
    </div>
    <div class="image-source">
      Photo by <a href="https://haliewestphotography.com/">Halie West</a> on <a href="https://unsplash.com/ko/@haliewestphoto">Unsplash</a>
    </div>
  </section>

  <section class="main">
    <p class="description">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
    <p class="description">You <em>know</em> you want to.</p>

    <form action="#" method="post" class="signup-form">
      <div class="form-item-container">
        <h2 class="form-title">Let's do this!</h2>
        <div class="form-input-item">
          <label for="first-name">first name</label>
          <input type="text" name="first-name" id="first-name">
        </div>
        <div class="form-input-item">
          <label for="last-name">last name</label>
          <input type="text" name="last-name" id="last-name">
        </div>
        <div class="form-input-item">
          <label for="email">email</label>
          <input type="text" name="email" id="email">
        </div>
        <div class="form-input-item">
          <label for="phone-number">phone number</label>
          <input type="number" name="phone-number" id="phone-number">
        </div>
        <div class="form-input-item">
          <label for="password">password</label>
          <input type="number" name="password" id="password">
        </div>
        <div class="form-input-item">
          <label for="confirm-password">confirm password</label>
          <input type="number" name="confirm-password" id="confirm-password">
        </div>
      </div>
      <button type="submit" class="form-submit-button">Create Account</button>
    </form>

    <p class="login-suggestion">Already have an account? <a href="#">Log in</a></p>
  </section>
</body>
</html>
